apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: mix-design-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/aayush0325/homelab-k3s.git
    targetRevision: HEAD
    path: manifests/mix-design/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: mix-design-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

